<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mouse events</title>
</head>
<body>
    <input type="text" id="name" placeholder="Enter your name"  onmouseover="myFunction()">
    <input type="text" id="email" placeholder="Enter your email" onmouseout="myFunction1()">

    <script>
        function myFunction() {
            alert("Mouse is over the input field!");
            console.log("Mouse is over the input field!");
        }
        function myFunction1() {
            alert("Mouse is out of the input field!");
            console.log("Mouse is out of the input field!");
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIV ELEMENTS</title>
</head>
<body>
    <div>
        <h1>Heading 1</h1>
        <p>This is a paragraph inside a div.</p>
    </div>
    <div style="color: brown;">
        <h2>Heading 2</h2>
        <p>This is another paragraph inside a different div.</p>
    </div>
</body>

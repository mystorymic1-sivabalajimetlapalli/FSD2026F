<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERSON BIODATA FORM</title>
</head>
<body>
    <form  style="display: flex;text-align: center;">
        <fieldset style="background-color: lightblue;text-decoration: dotted;text-align: center;">
            <legend>Personal Information</legend>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name"><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email"><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password"><br><br>
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob"><br><br>
            <label for="ph.no">Phone Number:</label>
            <input type="tel" id="ph.no" name="ph.no"><br><br>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age"><br><br>
            <label for="birth certificate">Birth Certificate:</label>
            <input type="file" id="birth certificate" name="birth certificate"><br><br>
            <label for="gender">Gender:</label>
            <select id="gender" name="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select><br><br>
            <label for="gende">gender</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>              
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label>

            <BR>
            </BR>
            <input type="submit" value="Submit">
            
        </fieldset>
    </form>
</body>
</html>

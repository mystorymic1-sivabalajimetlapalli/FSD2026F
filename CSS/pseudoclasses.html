<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo class in css</title>
</head>
<body>
    <p>pseudo classes in css</p>
<style>
/* pseudo class is used to select the element based on its state or position in the document. */
/* example of pseudo class is :hover, :active, :focus, :first-child, :last-child, :nth-child(n) etc. */
/* example of :hover pseudo class */
p:hover {
    color: red}
/* example of :active pseudo class */   
p:active {
         background-color:yellow;
}
/* example of :focus pseudo class */
input:focus {
    border: 2px solid blue;
}
/* example of :first-child pseudo class */
</style>

</body>
</html>

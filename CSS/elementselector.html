<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEMENT SELECTOR</title>
</head>
<body>
    <h1>This is an Element Selector Example</h1>
    <p>This paragraph is styled using an element selector.</p>  
    <style>
        h1 {
            color: blue;
            text-align: center;
        }
        p {
            font-size: 18px;
            color: green;
        }
    </style>
</body>
</html>

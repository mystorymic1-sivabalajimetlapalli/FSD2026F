<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID SELECTOR</title>
</head>
<body>
    <p id="myParagraph">This paragraph is styled using an ID selector.</p>
    <style>
        #myParagraph {
            font-size: 18px;
            color: green;
        }
    </style>    
</body>
</html>

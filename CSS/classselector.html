<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASS SELECTOR</title>
</head>
<body>
    <h1 class="title">This is a Class Selector Example</h1>
    <p class="text">This paragraph is styled using a class selector.</p>  
    <style>
        .title {
            color: blue;
            text-align: center;
        }
        .text {
            font-size: 18px;
            color: green;
        }
    </style>
</body>
</html>
